	tags = engine, liquidEngine, hypergolic, korea

	MODULE
	{
		name = ModuleEnginesRF
		maxThrust = 290
		exhaustDamage = True
		ignitionThreshold = 0.1
		thrustVectorTransformName = thrustTransform

		// Propellants
	}
	MODULE
	{
		name = ModuleEngineConfigs
		type = ModuleEngines
		configuration = 4D10
		origMass = 1.100
		modded = false

		CONFIG
		{
			name = 4D10
			maxThrust = 290
			heatProduction = 100

			IGNITOR_RESOURCE
			{
				name = ElectricCharge
				amount = 0.01
			}
			PROPELLANT
			{
				name = UDMH
				ratio = 0.277
				DrawGauge = True
			}
			PROPELLANT
			{
				name = NTO
				ratio = 0.723
				DrawGauge = False
			}
			atmosphereCurve
			{
				key = 0 300
				key = 1 265
			}

			ullage = True
			pressureFed = False
			ignitions = 1

			powerEffectName = Hypergolic-OMS-Red
		}
	}
	MODULE
    {
        name = ModuleSurfaceFX
        thrustProviderModuleIndex = 0
        fxMax = 0.3
        maxDistance = 30
        falloff = 1.7
        thrustTransformName = thrustTransform
    }
	MODULE
    {
        name = FXModuleThrottleEffects
        fxModuleNames = throttleColor
        responseSpeed = 1.0
        dependOnEngineState = True
        dependOnThrottle = True
    }
	MODULE
	{
		name = ModuleGimbal
		gimbalTransformName = gimbal
		gimbalRange = 4
 		gimbalResponseSpeed = 8
 		useGimbalResponseSpeed = true
		gimbalLimitX = true  // Habilita yaw
    	gimbalLimitY = true  // Habilita pitch
    	gimbalLimitZ = false // Desabilita roll
	}
