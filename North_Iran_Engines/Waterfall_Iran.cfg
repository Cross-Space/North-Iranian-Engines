// === BRA-Nodong ===
@PART[BRA-Nodong]:BEFORE[ROWaterfall]:NEEDS[Waterfall]
{
    ROWaterfall
    {
        template = waterfall-kerosene-nitric-acid-lower-1
        audio = pump-fed-light-1
        position = 0,0,0
        rotation = 0, 0, 0
        scale = 0.56, 0.56, 1.1
        
        MainPlumeVariant:NEEDS[B9PartSwitch]
        {
            name = udmh-nto
            template = waterfall-hypergolic-UDMH-NTO-lower-1
        }
    }    
    @MODULE[ModuleEngineConfigs]:NEEDS[B9PartSwitch]
    {
        @CONFIG[Nodong+]
        {
            %rowaterfallVariant = udmh-nto
        }
        @CONFIG[Nodong++]
        {
            %rowaterfallVariant = udmh-nto
        }
        @CONFIG[Shahab-3]
        {
            %rowaterfallVariant = udmh-nto
        }
        @CONFIG[Nodong?(Safir-1)]
        {
            %rowaterfallVariant = udmh-nto
        }
    }
}
